name: CI

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Generate Build Infos – runs first, all other jobs depend on this
  # ──────────────────────────────────────────────────────────────────────────────
  generate-infos:
    name: Generate Build Infos
    uses: layer87-labs/relctl-action/.github/workflows/generate-build-infos.yml@main
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────────
  # Build – multi-arch compile check
  # ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: [generate-infos]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: make ci/build

  # ──────────────────────────────────────────────────────────────────────────────
  # Audit (vet, staticcheck, govulncheck, lint, tests)
  # ──────────────────────────────────────────────────────────────────────────────
  audit:
    name: Audit
    runs-on: ubuntu-latest
    needs: [generate-infos]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run audit
        run: make audit

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: build/coverage/coverage.html
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────────
  # CodeQL – static security analysis
  # ──────────────────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: [generate-infos]
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  # ──────────────────────────────────────────────────────────────────────────────
  # Trivy – filesystem vulnerability scan
  # ──────────────────────────────────────────────────────────────────────────────
  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    needs: [generate-infos]
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ──────────────────────────────────────────────────────────────────────────────
  # Dependency Review – only on PRs
  # ──────────────────────────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: [generate-infos]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          # Only fail on high/critical CVEs.
          fail-on-severity: high
