name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark and close stale issues/PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          # Issues
          days-before-issue-stale: 60
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            any activity in the last 60 days. It will be closed in 7 days if no
            further activity occurs. Thank you for your contributions!
          close-issue-message: >
            This issue has been automatically closed because it has been stale for
            7 days with no activity. Feel free to reopen it if it is still relevant.

          # Pull Requests
          days-before-pr-stale: 60
          days-before-pr-close: 7
          stale-pr-label: "stale"
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has
            not had any activity in the last 60 days. It will be closed in 7 days
            if no further activity occurs. Thank you for your contributions!
          close-pr-message: >
            This pull request has been automatically closed because it has been
            stale for 7 days with no activity. Feel free to reopen it if you want
            to continue working on this change.

          # Never stale these
          exempt-issue-labels: "pinned,security,bug"
          exempt-pr-labels: "pinned,security"
